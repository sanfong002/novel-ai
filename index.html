<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>💕 ลองจีบดูไหม — FlirtChat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg: #0f0a0e;
  --bg2: #1a1118;
  --bg3: #221520;
  --border: #3d2535;
  --pink: #e8699a;
  --pink2: #f0a0c0;
  --pink-glow: rgba(232,105,154,0.25);
  --gold: #d4a853;
  --text: #f0e0ea;
  --muted: #9a7080;
  --user-bg: #1a2a3a;
  --user-border: #2a4a6a;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Sarabun',sans-serif;
  font-weight:300;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* floating hearts bg */
.hearts-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.heart{position:absolute;bottom:-20px;font-size:14px;opacity:0;animation:floatHeart linear infinite}
@keyframes floatHeart{
  0%{opacity:0;transform:translateY(0) scale(0.8)}
  15%{opacity:.4}
  80%{opacity:.15}
  100%{opacity:0;transform:translateY(-100vh) scale(1.1) rotate(20deg)}
}

/* glow bg */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 40% at 20% 90%,rgba(180,40,80,.25) 0%,transparent 60%),
    radial-gradient(ellipse 40% 50% at 80% 10%,rgba(100,20,60,.2) 0%,transparent 60%);
  animation:breathe 8s ease-in-out infinite alternate;
}
@keyframes breathe{from{opacity:.7}to{opacity:1}}

/* ── LAYOUT ── */
.app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100vh;max-width:820px;
  margin:0 auto;padding:0 16px;
}

/* ── HEADER ── */
.header{
  padding:16px 0 10px;
  text-align:center;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.header-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,3.5vw,26px);
  color:var(--pink2);
  letter-spacing:.05em;
  text-shadow:0 0 24px var(--pink-glow);
}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:.2em;margin-top:3px}

/* ── CHARACTER SELECTOR ── */
.char-row{display:flex;gap:8px;justify-content:center;padding:10px 0 6px;flex-wrap:wrap}
.char-btn{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:40px;padding:8px 18px;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;gap:8px;
  font-family:'Sarabun',sans-serif;font-size:13px;color:var(--muted);
}
.char-btn:hover{border-color:var(--pink);color:var(--text)}
.char-btn.active{
  border-color:var(--pink);color:var(--text);
  background:rgba(232,105,154,.12);
  box-shadow:0 0 16px var(--pink-glow);
}
.char-btn .av{font-size:20px}
.char-btn .cn{font-size:11px;color:var(--muted);display:block;line-height:1}
.char-btn.active .cn{color:var(--pink2)}

/* ── AFFECTION METER ── */
.meter-row{
  display:flex;align-items:center;gap:8px;
  padding:4px 0 10px;
}
.meter-label{font-size:10px;color:var(--muted);letter-spacing:.15em;white-space:nowrap}
.meter-track{
  flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden;
}
.meter-fill{
  height:100%;
  background:linear-gradient(90deg,#c06080,var(--pink),#ffb0c8);
  border-radius:3px;
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 6px var(--pink);
}
.meter-emoji{font-size:14px;transition:all .5s}

/* ── MESSAGES ── */
.chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.messages{
  flex:1;overflow-y:auto;padding:12px 0;
  display:flex;flex-direction:column;gap:12px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* welcome card */
.welcome{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-left:3px solid var(--pink);
  border-radius:14px;padding:20px;text-align:center;
  animation:fadeUp .5s ease;
}
.welcome-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:15px;color:var(--pink2);margin-bottom:8px;
}
.welcome-text{font-size:13px;color:var(--muted);line-height:1.8}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* message bubble */
.msg{display:flex;gap:10px;align-items:flex-end;animation:fadeUp .3s ease}
.msg.user{flex-direction:row-reverse}
.msg-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  border:1px solid var(--border);background:var(--bg2);
}
.msg.user .msg-av{background:#162030;border-color:var(--user-border)}
.msg-bubble{
  max-width:72%;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px 14px 14px 4px;
  padding:11px 14px;font-size:14px;line-height:1.75;
  color:var(--text);position:relative;
}
.msg.user .msg-bubble{
  background:var(--user-bg);border-color:var(--user-border);
  border-radius:14px 14px 4px 14px;
  color:#c8dce8;
}
.msg-name{
  font-size:10px;color:var(--pink);font-family:'Playfair Display',serif;
  font-style:italic;display:block;margin-bottom:4px;
}
.msg.user .msg-name{display:none}
/* emotion tag */
.emotion{
  display:inline-block;font-size:11px;color:var(--pink2);
  background:rgba(232,105,154,.12);border-radius:20px;
  padding:1px 8px;margin-top:4px;
}

/* typing */
.typing-dots{display:flex;gap:4px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:14px}
.typing-dots span{width:5px;height:5px;background:var(--pink);border-radius:50%;animation:dot 1.2s infinite;box-shadow:0 0 5px var(--pink)}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* ── INPUT ── */
.input-area{
  padding:10px 0 16px;
  border-top:1px solid var(--border);
  flex-shrink:0;
  position:relative;
}
.input-area::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:120px;height:1px;
  background:linear-gradient(90deg,transparent,var(--pink),transparent);
}

/* hint pills */
.hints{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hint{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:11px;padding:4px 10px;
  border-radius:20px;cursor:pointer;
  font-family:'Sarabun',sans-serif;transition:all .2s;
}
.hint:hover{border-color:var(--pink);color:var(--text);background:rgba(232,105,154,.08)}

/* lang toggle */
.lang-row{display:flex;gap:5px;justify-content:flex-end;margin-bottom:8px}
.lang-btn{
  background:var(--bg2);border:1px solid var(--border);
  color:var(--muted);font-size:10px;padding:3px 10px;
  border-radius:20px;cursor:pointer;
  font-family:'Sarabun',sans-serif;transition:all .2s;letter-spacing:.05em;
}
.lang-btn.active{border-color:var(--gold);color:var(--gold)}

.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-input{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:11px 14px;
  color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;
  resize:none;min-height:44px;max-height:110px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.msg-input:focus{border-color:var(--pink);box-shadow:0 0 10px var(--pink-glow)}
.msg-input::placeholder{color:var(--muted);font-style:italic}
.send-btn{
  width:44px;height:44px;flex-shrink:0;
  background:linear-gradient(135deg,var(--pink),#c04070);
  border:none;border-radius:12px;color:#fff;
  font-size:18px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--pink-glow);
}
.send-btn:hover:not(:disabled){transform:scale(1.08);box-shadow:0 0 22px rgba(232,105,154,.5)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

@media(max-width:500px){
  .msg-bubble{max-width:85%;font-size:13px}
  .hints{display:none}
}
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="header-title">💕 ลองจีบดูไหม</div>
    <div class="header-sub">FLIRTCHAT · AI ROMANCE · เริ่มต้นบทสนทนา</div>

    <!-- Character selector -->
    <div class="char-row" id="charRow">
      <button class="char-btn active" data-char="mina" onclick="selectChar('mina')">
        <span class="av">👩</span>
        <div><span>Mina</span><span class="cn">มินา · บาริสต้า</span></div>
      </button>
      <button class="char-btn" data-char="kai" onclick="selectChar('kai')">
        <span class="av">👨</span>
        <div><span>Kai</span><span class="cn">ไค · สถาปนิก</span></div>
      </button>
      <button class="char-btn" data-char="ploy" onclick="selectChar('ploy')">
        <span class="av">🧑</span>
        <div><span>Ploy</span><span class="cn">พลอย · นักออกแบบ</span></div>
      </button>
    </div>

    <!-- Affection meter -->
    <div class="meter-row">
      <span class="meter-label">💗 AFFECTION</span>
      <div class="meter-track"><div class="meter-fill" id="meterFill" style="width:20%"></div></div>
      <span id="meterEmoji">😐</span>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-title">ยินดีต้อนรับสู่ FlirtChat 💌</div>
        <div class="welcome-text">
          เลือกคนที่อยากคุยด้วย แล้วเริ่มต้นบทสนทนา<br>
          จะจีบแบบไหนก็ได้ — แต่ต้องทำให้เขา/เธอประทับใจนะ 😏<br><br>
          <em style="color:var(--pink2)">ยิ่งจริงใจ ยิ่งได้ใจ ✨</em>
        </div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="hints" id="hints">
      <button class="hint" onclick="useHint('สวัสดี 😊 วันนี้เป็นยังไงบ้าง?')">👋 ทักทาย</button>
      <button class="hint" onclick="useHint('ชอบทำอะไรในเวลาว่าง?')">🎯 ถามความสนใจ</button>
      <button class="hint" onclick="useHint('มีคาเฟ่แนะนำไหม? อยากลองไปกัน')">☕ ชวนไปคาเฟ่</button>
      <button class="hint" onclick="useHint('ถ้าจะไปเที่ยวที่ไหนสักที่ตอนนี้เลย จะไปไหน?')">✈️ ถามความฝัน</button>
    </div>
    <div class="lang-row">
      <button class="lang-btn active" data-lang="mix" onclick="setLang('mix')">TH+EN</button>
      <button class="lang-btn" data-lang="th" onclick="setLang('th')">ไทย</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msgInput"
        placeholder="พิมพ์ข้อความ... / Type here..."
        rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">💌</button>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let selectedChar = 'mina';
let language = 'mix';
let history = [];
let affection = 20;
let msgCount = 0;

const CHARS = {
  mina:  { avatar:'👩', nameEN:'Mina',  nameTH:'มินา'  },
  kai:   { avatar:'👨', nameEN:'Kai',   nameTH:'ไค'    },
  ploy:  { avatar:'🧑', nameEN:'Ploy',  nameTH:'พลอย' },
};

const AFFECTION_EMOJI = [
  [0,  '😐'], [30, '🙂'], [45, '😊'],
  [60, '😍'], [75, '🥰'], [90, '💕'],
];

// ── Hearts background ────────────────────────────────────────────────────────
(function() {
  const bg = document.getElementById('heartsBg');
  const emojis = ['💕','💗','✨','💫','🌸','💞'];
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'heart';
    d.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    d.style.left = Math.random() * 100 + 'vw';
    d.style.animationDuration = (10 + Math.random() * 18) + 's';
    d.style.animationDelay = (Math.random() * 15) + 's';
    d.style.fontSize = (10 + Math.random() * 12) + 'px';
    bg.appendChild(d);
  }
})();

// ── Helpers ──────────────────────────────────────────────────────────────────
function selectChar(id) {
  selectedChar = id;
  history = [];
  affection = 20;
  msgCount = 0;
  document.querySelectorAll('.char-btn').forEach(b => b.classList.toggle('active', b.dataset.char === id));
  updateMeter(0);
  const c = CHARS[id];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="welcome">
      <div class="welcome-title">${c.avatar} ${c.nameEN} / ${c.nameTH}</div>
      <div class="welcome-text">เริ่มต้นบทสนทนาใหม่แล้ว...<br><em style="color:var(--pink2)">จะทำให้เขา/เธอประทับใจได้ไหม? 💌</em></div>
    </div>`;
}

function setLang(l) {
  language = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
}

function useHint(text) {
  document.getElementById('msgInput').value = text;
  autoResize(document.getElementById('msgInput'));
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function updateMeter(delta) {
  affection = Math.min(100, Math.max(0, affection + delta));
  document.getElementById('meterFill').style.width = affection + '%';
  const emoji = AFFECTION_EMOJI.slice().reverse().find(([n]) => affection >= n)?.[1] || '😐';
  document.getElementById('meterEmoji').textContent = emoji;
}

function formatText(t) {
  return t.replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/\n/g, '<br>');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// ── Send message ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';
  msgCount++;

  // User bubble
  const msgs = document.getElementById('messages');
  const uDiv = document.createElement('div');
  uDiv.className = 'msg user';
  uDiv.innerHTML = `<div class="msg-av">🫵</div><div class="msg-bubble">${formatText(text)}</div>`;
  msgs.appendChild(uDiv);
  history.push({ role: 'user', content: text });
  scrollBottom();

  // AI bubble (typing)
  const c = CHARS[selectedChar];
  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg ai';
  aiDiv.innerHTML = `
    <div class="msg-av">${c.avatar}</div>
    <div class="msg-bubble">
      <span class="msg-name">${c.nameEN}</span>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(aiDiv);
  scrollBottom();

  const bubble = aiDiv.querySelector('.msg-bubble');
  let fullText = '';
  let started = false;


  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, character: selectedChar, language }),
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        if (ev.type === 'delta') {
          if (!started) {
            bubble.innerHTML = `<span class="msg-name">${c.nameEN}</span>`;
            started = true;
          }
          fullText += ev.text;
          bubble.innerHTML = `<span class="msg-name">${c.nameEN}</span>${formatText(fullText)}`;
          scrollBottom();
        } else if (ev.type === 'done') {
          history.push({ role: 'assistant', content: fullText });
          // Affection heuristic based on response length and keywords
          const warmWords = ['ฮ่า','😊','น่ารัก','ชอบ','ดีใจ','สนุก','like','cute','sweet'];
          const coldWords = ['ไม่','ขอโทษ','busy','sorry','later'];
          let delta = 3;
          if (warmWords.some(w => fullText.includes(w))) delta += 7;
          if (coldWords.some(w => fullText.includes(w))) delta -= 8;
          if (msgCount <= 3) delta += 2; // early bonus
          updateMeter(delta);
        } else if (ev.type === 'error') {
          throw new Error(ev.message);
        }
      }
    }
  } catch (err) {
    bubble.innerHTML = `<span class="msg-name">${c.nameEN}</span><span style="color:var(--muted);font-style:italic">${err.message}</span>`;
  }

  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
